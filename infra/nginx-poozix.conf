    # ── POOZIX ML Visualizations ──
    # Add this block INSIDE the server { listen 443 ... } block
    # in /etc/nginx/sites-available/nareshka.conf
    # BEFORE the "location /" catch-all block

    location /poozix/ {
        alias /var/www/nareshka/poozix/;
        try_files $uri $uri/ /poozix/index.html;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }
